<!DOCTYPE html>

<head>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
}
.wrap {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 12px 18px;
  display: flex;
  flex-direction: column;
}
.header {
  font-size: 32px;
  margin-bottom: 10px;
  color: #00ffcc;
  font-weight: bold;
}
.line {
  font-size: 23px;
  line-height: 1.35;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin: 3px 0;
}
</style>
</head>
<body>

</body>
</html>
