<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garage Monitor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .title {
      position: absolute;
      top: 12px;
      left: 16px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 20px;
      z-index: 10;
    }

    .time {
      position: absolute;
      top: 12px;
      right: 16px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 20px;
      z-index: 10;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">車庫モニター</div>
    <div class="time" id="clock">--:--:--</div>
    <img src="http://192.168.0.55:8080/?action=stream" alt="Garage Camera Stream">
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
